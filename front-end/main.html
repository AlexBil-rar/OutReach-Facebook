<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

  <title>FB Groups Outreach Dashboard</title>
  <style>
    :root{
      --bg: #F4F5F7;
      --panel: #FFFFFF;
      --text: #172B4D;
      --muted: #5E6C84;
      --border: #DFE1E6;
      --grid: #EBECF0;       /* lighter table gridlines */
      --header: #FAFBFC;
      --hover: #F7F8F9;
      --focus: rgba(12,102,228,.14);
      --link: #4C9BFF;          /* softer blue for links */
      --primary: #4C9BFF;
      --primary-bg: rgba(76,155,255,.10);
      --green: #22A06B;
      --green-bg: rgba(34,160,107,.10);
      --shadow: 0 8px 24px rgba(9,30,66,.18);
      --radius: 12px;
      --radius-sm: 10px;
      --topbar-h: 64px;
      --sidebar-w: 260px;
      --sidebar-w-collapsed: 76px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    *{ box-sizing: border-box; }
    *, *::before, *::after{ font-family: var(--font); }
    button, input, select, textarea{ font-family: var(--font); }
    html, body{ height:100%; }
    body{
      margin:0;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden; /* prevent page-level horizontal scroll */
    }

    a{ color: var(--link); text-decoration: none; }
    a:hover{ text-decoration: underline; }

    /* Layout */
    .app{
      display:flex;
      min-height:100vh;
      width:100%;
    }
.export-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.export-grid {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 16px 20px;
  align-items: center;
}

.export-label {
  font-size: 14px;
  color: #666;
}

.export-value {
  font-weight: 600;
}

.export-field-wrapper {
  width: 100%;
}

.export-footer {
  display: flex;
  justify-content: flex-end;
}

    .sidebar{
      width: var(--sidebar-w);
      background: var(--panel);
      border-right: 1px solid var(--border);
      position: sticky;
      top:0;
      height:100vh;
      display:flex;
      flex-direction: column;
      transition: width .18s ease;
      z-index: 30;
    }
    .sidebar.collapsed{ width: var(--sidebar-w-collapsed); }

.ts-dropdown-content {
  z-index: 10000;
}
    .sidebarHeader{
      height: var(--topbar-h);
      display:flex;
      align-items:center;
      gap:10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
    }

    .burger{
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .burger:hover{ background: var(--hover); }
    .burger:focus{ outline: none; box-shadow: 0 0 0 3px var(--focus); }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .logo{
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1D7AFC, #0C66E4);
    }
    .brandText{
      font-weight: 800;
      letter-spacing: .2px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .sidebar.collapsed .brandText{ display:none; }

    .linkCell {
  cursor: pointer;
  color: #2563eb;
  font-weight: 500;
}

.linkCell:hover {
  text-decoration: underline;
}
    .nav{
      padding: 10px;
      display:flex;
      flex-direction: column;
      gap: 6px;
    }
    .navItem{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor:pointer;
      color: var(--text);
      border: 1px solid transparent;
      user-select:none;
    }
    .navItem:hover{ background: var(--hover); }
    .navItem.active{
      background: rgba(12,102,228,.08);
      border: 1px solid rgba(12,102,228,.22);
      color: #09326C;
      font-weight: 700;
    }
    .navIcon{
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      color: currentColor;
    }
    .navLabel{
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .sidebar.collapsed .navLabel{ display:none; }

    .sidebarFooter{
      margin-top: auto;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    .sidebar.collapsed .sidebarFooter span{ display:none; }

    /* Main */
    .main{
      flex:1;
      display:flex;
      flex-direction: column;
      min-width:0;
    }

    .topbar{
      position: sticky;
      top:0;
      z-index: 20;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .topbarInner{
      padding: 14px 18px 12px;
      display:flex;
      flex-direction: column;
      gap: 10px;
    }

    .pageHeader{
      display:flex;
      align-items:flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .titleWrap{ min-width:0; }
    .pageTitle{ font-size: 18px; font-weight: 900; margin:0; }
    .pageSubtitle{ margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .headerActions{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap: wrap;
    }

    .btn{
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 9px 12px;
      border-radius: 10px;
      cursor:pointer;
      font-weight: 700;
      color: var(--text);
      display:inline-flex;
      align-items:center;
      gap: 8px;
      user-select:none;
      white-space: nowrap;
    }
    .btn:hover{ background: var(--hover); }
    .btn:focus{ outline:none; box-shadow: 0 0 0 3px var(--focus); }

    .btn.primary{
      border-color: rgba(12,102,228,.26);
      background: var(--primary-bg);
      color: #09326C;
    }
    .btn.success{
      border-color: rgba(34,160,107,.35);
      background: var(--green-bg);
      color: #0B5A3C;
    }
    .btn.danger{
      border-color: rgba(234,84,85,.35);
      background: rgba(234,84,85,.12);
      color: #923232;
    }

    .btn.ghost{
      background: transparent;
    }

    .badge{
      display: none;
      align-items:center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--header);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .badge.warn{
      border-color: rgba(245, 205, 71, .55);
      background: rgba(245, 205, 71, .14);
      color: #5D3B09;
    }

    .filters{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display:flex;
      flex-direction: column;
      gap: 10px;
    }
    .filters.hidden{ display:none; }

    .filterRow{
      display:flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
    }

    .field{
      display:flex;
      flex-direction: column;
      gap: 6px;
      min-width: 160px;
      max-width: 320px;
    }
    .field.wide{ min-width: 280px; max-width: 520px; }
    .field.small{ min-width: 140px; max-width: 220px; }
    .field label{
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: .2px;
      display:flex;
      align-items:center;
      gap: 6px;
    }
.export-active-filters {
  margin-bottom: 16px;
}

.export-active-filters .label {
  font-size: 13px;
  color: #666;
  margin-bottom: 6px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: #eef2ff;
  color: #2b4eff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}

    .input, select{
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      background: var(--panel);
      color: var(--text);
      outline: none;
      font: inherit;
      font-size: 13px;
    }
    .input:focus, select:focus{
      border-color: rgba(12,102,228,.35);
      box-shadow: 0 0 0 3px var(--focus);
    }

    .rangeWrap{
      display:flex;
      gap: 8px;
      align-items:center;
    }
    .rangeVal{
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      min-width: 72px;
      text-align:center;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 8px;
      background: var(--header);
    }
    input[type="range"]{
      width: 180px;
      accent-color: var(--primary);
    }

    /* Content */
    .content{
      padding: 14px 18px 25px;
      min-width:0;
    }

    .tableCard{
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .tableToolbar{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-wrap: wrap;
    }

    .meta{
      display:flex;
      gap: 10px;
      align-items:center;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .tableScroller{
    flex: 1 1 auto;
    overflow: auto;
  }

  .export-row {
  display: flex;
  gap: 24px;
  align-items: flex-end;
}

.export-format {
  min-width: 100px;
}

.export-fields {
  flex: 1;
}

.export-actions {
  display: flex;
  align-items: flex-end;
}

.export-fields .label,
.export-format .label {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 6px;
}

.export-format .value {
  font-weight: 600;
}

    .tableScrollTop{
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      height: 16px;
      background: var(--header);
      -webkit-overflow-scrolling: touch;
    }
    .tableScrollSpacer{ height: 16px; }
    .tableWrap{
      max-width: 100%;
      height: calc(100vh - 200px);
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
    }
    @supports not selector(::-webkit-scrollbar){
      .tableWrap{ scrollbar-width: thin; }
    }

    table{
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 980px;
      text-align: center;
    }

    thead th{
      position: sticky;
      top: 0;
      z-index: 5;
      background: var(--header);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .3px;
      text-align: center;
      padding: 10px 9px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--grid);
      white-space: nowrap;
      vertical-align: middle;
      overflow: visible;
    }
    thead th:last-child{ border-right: 0; }

    tbody td{
      padding: 8px 8px;
      border-bottom: 1px solid var(--grid);
      border-right: 1px solid var(--grid);
      vertical-align: middle;
      text-align: center;
      font-size: 13px;
      background: var(--panel);
    }
    tbody td:last-child{ border-right: 0; }

    tbody tr:hover td{ background: var(--hover); }

    .cellMuted{ color: var(--muted); }
    .cellMono{ font-family: var(--font); font-size: 12px; }
    .nowrap{ white-space: nowrap; }
    .center{ text-align:center; }
    .right{ text-align:right; }

    /* Sticky right column (Contacted) */
    .stickyRight{
      position: sticky;
      right: 0;
      z-index: 4;
      background: var(--panel);
      box-shadow: -10px 0 12px rgba(9,30,66,.06);
    }
    thead th.stickyRight{
      z-index: 7;
      background: var(--header);
    }

    /* Row number */
    .rowNo{ width: 56px; }

    /* Type icons */
    .typeIcon{
      width: 22px;
      height: 22px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--header);
    }
    .typeIcon svg{ width: 16px; height: 16px; color: var(--muted); }

    .filterList.vertical {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.filterOption {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
}

.filterPopover {
  min-width: 220px;
}

    /* User/group cells */
    .entity{
      display:flex;
      flex-direction: column;
      gap: 2px;
      min-width: 160px;
      align-items: center;
      text-align: center;
    }
    .entity.groupEntity{
      min-width: 120px;
      max-width: 220px;
      align-items: center;
      text-align: center;
    }
    .entityTop{
      display:flex;
      align-items:center;
      gap: 8px;
      min-width:0;
      justify-content: center;
    }
    .entityName{
      font-weight: 900;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 320px;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--link);
      text-align: left;
    }
    .groupEntity .entityName{
      white-space: normal;
      line-height: 1.3;
      text-align: center;
      display: block;
    }
    .groupCol{ width: 200px; max-width: 220px; }
    .longCol{ min-width: 480px; }
    .summaryCol{ min-width: 400px; max-width: 480px; }
    .summaryColNotes{min-width: 180px; max-width: 180px; }
    .entitySub{
      color: var(--muted);
      font-size: 12px;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 420px;
    }
    .miniBtn{
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
      user-select:none;
      white-space: nowrap;
    }
    .miniBtn:hover{ background: var(--hover); }
    .miniBtn:focus{ outline:none; box-shadow: 0 0 0 3px var(--focus); }

    /* Open link button */
    .linkBtn{
      border: 1px solid var(--border);
      background: var(--header);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      cursor:pointer;
      white-space: nowrap;
      transition: background .12s ease;
    }
    .linkBtn:hover{ background: var(--hover); }
    .linkBtn:focus{ outline:none; box-shadow: 0 0 0 3px var(--focus); }
    .userNameBtn{
      color: var(--link);
      border-color: rgba(76,155,255,.35);
      background: var(--header);
    }

       .contactsModal{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.contactBlock{
  padding:12px;
  border:1px solid #e5e7eb;
  border-radius:10px;
}

.contactLabel{
  font-size:12px;
  color:#6b7280;
  margin-bottom:4px;
}

.contactValue{
  font-size:14px;
  color:#2563eb;
  text-decoration:none;
}

.contactValue:hover{
  text-decoration:underline;
}
    .userNameBtn:hover{ background: var(--primary-bg); color: #2f7ed6; }
    .openLink{
      display:inline-block;
      background: transparent;
      border: none;
      padding: 0;
      font-weight: 900;
      color: var(--link);
      text-decoration: none;
      border-radius: 0;
    }
    .openLink:hover{ text-decoration: underline; background: transparent; }
    .openLink:focus{ outline: none; box-shadow: 0 0 0 3px var(--focus); }

    /* Contacted pill */
    .contactPill{
      display:inline-flex;
      align-items:center;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid var(--border);
      background: var(--header);
      color: var(--muted);
      cursor: pointer;
      user-select:none;
      white-space: nowrap;
      justify-content:center;
      width: 120px;
      margin: 0 auto;
    }

    .contactPill.yes{
      border-color: rgba(34,160,107,.35);
      background: var(--green-bg);
      color: #0B5A3C;
    }
    .contactPill.no{
      border-color: rgba(234,84,85,.35);
      background: rgba(234,84,85,.12);
      color: #923232;
    }

    /* Two-line clamp + More */
    .clampCell{ display:flex; flex-direction: column; gap: 4px; }
    .clamp2{
      display:-webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow:hidden;
      line-height: 1.35;
      word-break: break-word;
      cursor: pointer;
      position: relative;
      border-radius: 6px;
      padding: 2px 4px;
      transition: box-shadow .12s ease, background .12s ease;
      text-align: start;
      direction: auto;
    }
    .clamp2:hover{
      box-shadow: inset 0 0 0 1px var(--primary);
      background: var(--primary-bg);
    }

    .cellClick{
      display: inline-block;
      cursor: pointer;
      color: var(--text);
      font-weight: 400;
      border-radius: 6px;
      padding: 2px 4px;
      transition: box-shadow .12s ease, background .12s ease;
    }
    .cellClick:hover{
      box-shadow: inset 0 0 0 1px var(--primary);
      background: var(--primary-bg);
    }
    .clamp2.truncated{
      cursor: pointer;
    }
    .clamp2.truncated::after{
      content: "...";
      color: var(--muted);
      margin-left: 4px;
    }

    .summaryStack{ display:flex; flex-direction: column; gap: 6px; }
    .summaryLabel{ font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .2px; }
    .summaryMeta{
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items:center;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    
    .contactsCell{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .contactLink{
      color:#2563eb;
      text-decoration:none;
      font-size:13px;
    }

    .contactLink:hover{
      text-decoration:underline;
    }

    .blockContent {
  margin-top: 6px;
}

    .NotesTextarea {
      background: #fff;
      padding: 0px;
      width: 100% !important ;
      min-height: 40px;
      border-radius: 0px;
      border: 1px solid #ffff;
      outline: none
    }

    /* Header help tooltip */
    .help{
      position: relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      cursor: default;
      user-select:none;
      margin-left: 4px;
      flex: 0 0 auto;
    }
    .help:hover::after{
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 20px;
      background: #1D2125;
      color: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      width: 240px;
      line-height: 1.3;
      z-index: 50;
      box-shadow: 0 10px 26px rgba(0,0,0,.22);
    }
    .help:hover::before{
      content: "";
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-bottom-color: #1D2125;
      z-index: 50;
    }

    .thHelp{
      position: absolute;
      inset: 0;
      z-index: 6;
    }


    .thFilterWrap{
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .filterBtn{
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
    }
    .filterBtn:hover{ background: var(--hover); }
    .filterBtn.active{
      border-color: rgba(12,102,228,.35);
      background: var(--primary-bg);
      color: #0C66E4;
    }
    .filterBtn svg{ width: 14px; height: 14px; }
    .filterPopover{
      position: absolute;
      top: calc(100% + 6px);
      transform: translateX(-40%);
      display: none;
      padding: 8px;
      background: #F7F9FF;
      color: #112A45;
      border: 1px solid #D5DFF7;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(16,42,67,.14);
      z-index: 90;
      text-align: left;
    }
    .filterPopover.open{ display: block; }
    .filterTitle{
      font-weight: 500;
      font-size: 12px;
      margin-bottom: 4px;
      color: #1B2A3A;
    }
    .filterList{
      max-height: 120px;
      overflow: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filterOption{
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      line-height: 1.3;

/* ==============================

function apiFetch(url, options = {}) {
  const token = localStorage.getItem("auth_token");

  return fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      "Authorization": "Bearer " + token
    }
  }).then(async res => {
    if (res.status === 401) {
      localStorage.removeItem("auth_token");
      window.location.href = "/login";
      throw new Error("Unauthorized");
    }

    if (!res.ok) {
      const text = await res.text();
      console.error("API error:", text);
      throw new Error("Server error");
    }

    return res.json();
  });
}

  function formatDateShort(dateStr){

      if(Array.isArray(v)){
        return v.map(friendlySellBuy).join(", ");
      }
      v = (v ?? "unknown");
      if(typeof v !== "string") v = String(v);
      v = v.toLowerCase();
      if(v === "sell") return "Sell";
      if(v === "buy") return "Buy";
      return "Unknown";

    function inferSellBuyFromText(text){
      if(!text) return "unknown";
      const t = text.toLowerCase();
      if(t.includes("selling") || t.includes("sell") || t.includes("for sale") || t.includes("прода")) return "sell";
      if(t.includes("buy") || t.includes("looking to buy") || t.includes("budget") || t.includes("куплю") || t.includes("מחפש")) return "buy";
      return "unknown";
    }

    function detectLanguage(text){
      const s = String(text || "");
      const hasHeb = /[\u0590-\u05FF]/.test(s);
      const hasCyr = /[\u0400-\u04FF]/.test(s);
      const hasAra = /[\u0600-\u06FF]/.test(s);
      const hasLat = /[A-Za-z]/.test(s);
      const flags = [hasHeb, hasCyr, hasAra, hasLat].filter(Boolean).length;
      if(flags >= 2) return "Mixed";
      if(hasHeb) return "Hebrew";
      if(hasCyr) return "Russian";
      if(hasAra) return "Arabic";
      if(hasLat) return "English";
      return "Unknown";
    }

    function matchesLanguage(lang, text){
      if(!lang || lang === "all") return true;
      return detectLanguage(text) === lang;

        }
      }
      return max;
    }


    function extractContacts(entity){
      const raw = entity.Contacts;
      if(typeof raw !== "string" || !raw.trim()) return null;

      const parts = raw.split(",").map(s => s.trim());

      return {
        phone: parts.find(p => /^\+?\d{7,}/.test(p)) || null,
        email: parts.find(p => p.includes("@")) || null,
        web:   parts.find(p => p.startsWith("http")) || null
      };
    }

      if(v === "users"){
        d.q = val("f_users_q");
        d.status = $("f_users_status")?.value ?? "all";

        d.maxComms = val("f_users_maxComms");

        d.city = val("f_posts_Location");
        d.status = $("f_posts_status").value;
        d.sellBuy = val("f_posts_sellBuy") === "all"
        ? ["sell","buy","unknown"]
        : [val("f_posts_sellBuy")];
        d.group = val("f_posts_group");
        d.sort = val("f_posts_sort");
        d.lang = val("f_posts_lang");
        d.priceMin = Number(val("f_posts_priceMin"));
        d.priceMax = Number(val("f_posts_priceMax"));
        if(d.priceMin > d.priceMax){ const tmp=d.priceMin; d.priceMin=d.priceMax; d.priceMax=tmp; }
      } else if(v === "comments"){
        d.q = val("f_comments_q");
        d.city = val("f_comments_Location");
        d.contacted = val("f_comments_contacted");
        d.sellBuy = val("f_comments_sellBuy");
        d.sort = val("f_comments_sort");
        d.lang = val("f_comments_lang");
        d.priceMin = Number(val("f_comments_priceMin"));
        d.priceMax = Number(val("f_comments_priceMax"));
        if(d.priceMin > d.priceMax){ const tmp=d.priceMin; d.priceMin=d.priceMax; d.priceMax=tmp; }
        } else { // all
          state.draft.all = JSON.parse(JSON.stringify(state.applied.all));

      }

    function wireFilterInputs(){

      const filtersRoot = $("filters");

        el.addEventListener("input", () => {
          readDraftFromInputs();
          syncPriceLabels();
          updateDirtyBadge();
        });
        el.addEventListener("change", () => {
          readDraftFromInputs();
          syncPriceLabels();
          updateDirtyBadge();
        });

          Type: "post",

          // AUTHOR OF ROW
          UserID: p.UserID,
          UserName: userName,
          ProfileURL: u?.ProfileURL || "",

          // POST DATA
          PostID: p.PostID,
          PostText: p.TextPost || "",
          PostURL: p.Posturl || "",

          GroupID: p.GroupID || "",
          GroupName: g?.GroupName || "-",
          GroupURL: g?.GroupURL || "#",

          Price: p.Price || 0,

          SellOrBuy: (p.SellBuy || p.SellOrBuy || inferSellBuyFromText(p.TextPost) || "unknown").toLowerCase(),

          Contacts: p.Contacts || "",
          DateISO: p.PostDate,

  const g = GroupById(p.GroupID);

  // -------- COMMENT AUTHOR --------

  const commentAuthorUser = userById(commentAuthorId);

  const commentAuthorName =
    (typeof c?.UserName === "string" && c.UserName.trim())
      ? c.UserName.trim()
      : (typeof commentAuthorUser?.UserName === "string" && commentAuthorUser.UserName.trim())
        ? commentAuthorUser.UserName.trim()

    c?.ProfileURL || commentAuthorUser?.ProfileURL || "";

  // 🔥 УНИФИЦИРОВАННЫЙ АКТЁР СТРОКИ

  UserName: commentAuthorName,
  ProfileURL: commentAuthorProfile,

  // (можно оставить если нужно отдельно)

  // POST DATA
  PostID: p.PostID,

  PostURL: p.Posturl || "",

  GroupURL: g?.GroupURL || "#",

  City: c.City || p.City || "-",

    c.SellBuy ||

    function getAllRowSources(row){
      if(!row) return { post:null, comment:null };

      if(row.Type === "post"){
        return { post: postById(row.PostID), comment: null };
      }

      if(row.Type === "comment"){
        return {
          post: postById(row.PostID),
          comment: commentById(row.CommentID),
        };
      }

      return { post:null, comment:null };
    }


    function getAllRowCity(row){
      const { post, comment } = getAllRowSources(row);
      return comment?.City || post?.City || "-";
    }

    function getAllRowLand(row){
      const { post, comment } = getAllRowSources(row);
      return Number(comment?.LandSize || post?.LandSize || 0);
    }

    function getAllRowPrice(row){
      const { post, comment } = getAllRowSources(row);
      return Number(comment?.Price || post?.Price || 0);
    }

    function getAllRowHasContacts(row){
      const { post, comment } = getAllRowSources(row);
      const src = comment || post;
      if(!src) return false;
      const c = extractContacts(src);
      return Boolean(c?.phone || c?.email);
    }

    function getAllCities(){
      const set = new Set();
      for(const p of DB.Post){ if(p.City) set.add(p.City); }
      for(const c of DB.Comment){ if(c.City) set.add(c.City); }
      return Array.from(set).sort((a,b) => a.localeCompare(b, "en", { sensitivity:"base" }));
    }

    function getPostCities(){
      const set = new Set();
      for(const p of DB.Post){ if(p.City) set.add(p.City); }
      return Array.from(set).sort((a,b) => a.localeCompare(b, "en", { sensitivity:"base" }));
    }

    function getCommentCities(){
      const set = new Set();
      for(const c of DB.Comment){ if(c.City) set.add(c.City); }
      return Array.from(set).sort((a,b) => a.localeCompare(b, "en", { sensitivity:"base" }));

    // ------------------------
    // Filter predicates
    // ------------------------
    function matchesContactedFilter(UserID, contacted){
      if(contacted === "all") return true;
      const is = getContacted(UserID);
      return contacted === "yes" ? is : !is;
    }

    function matchesSellBuyFilter(value, sellBuy){
      if(sellBuy === "all") return true;
      return (value || "unknown").toLowerCase() === sellBuy;
    }

    function matchesSellBuySet(value, set){
      if(!Array.isArray(set) || set.length === 0) return true;
      return set.includes((value || "unknown").toLowerCase());
    }

    function hasContactsObj(obj){
      return Boolean(obj?.phone || obj?.email);
    }

    function postHasContacts(post){
      return hasContactsObj(extractContacts(post));
    }

    function commentHasContacts(comment){
      return hasContactsObj(extractContacts(comment));
    }

    function containsInsensitive(hay, needle){
      if(!needle) return true;
      return String(hay || "").toLowerCase().includes(String(needle).toLowerCase());
    }

    function numInRange(n, minStr, maxStr){
      const min = minStr === "" ? null : Number(minStr);
      const max = maxStr === "" ? null : Number(maxStr);
      const val = Number(n ?? 0);
      if(min !== null && val < min) return false;
      if(max !== null && val > max) return false;
      return true;
    }

function normalizeContactsValue(value){
  if(!value) return [];
  if(Array.isArray(value)) return value;
  if(typeof value === "string"){
    return value.split(",").map(v => v.trim()).filter(Boolean);
  }
  return [];
}


function extractContacts(entity){
  const raw = entity.Contacts || entity.contacts || "";
  if(!raw) return null;

  const phones = raw.match(/(?:\+972|0)\d{8,9}/g) || [];
  const emails = raw.match(/[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/gi) || [];
  const webs   = raw.match(/https?:\/\/[^\s,]+/gi) || [];

  return {
    phone: [...new Set(phones)],
    email: [...new Set(emails)],
    web:   [...new Set(webs)]
  };
}


function renderContactsCell(entity){
  const c = extractContacts(entity);
  if(!c){
    return `<span class="cellMuted">-</span>`;
  }

  const phones = normalizeContactsValue(c.phone);
  const emails = normalizeContactsValue(c.email);
  const webs   = normalizeContactsValue(c.web);

  if(!phones.length && !emails.length && !webs.length){
    return `<span class="cellMuted">-</span>`;
  }

  const preview = [];

  // ✔ показываем реальные номера
  if(phones.length){
    preview.push(phones.join(", "));
  }

  // ✔ email / web — как типы, не как шум
  if(emails.length){
    preview.push("Email");
  }

  if(webs.length){
    preview.push("Website");
  }

  return `
    <span class="cellClick"
      data-action="openContacts"
      data-contacts='${escapeHtml(JSON.stringify({
        phone: phones,
        email: emails,
        web: webs
      }))}'>
      ${preview.join(", ")}
    </span>
  `;
}

  function formatFilters(filters) {
  if (!filters || Object.keys(filters).length === 0) {
    return "None";
  }

  return Object.entries(filters)
    .filter(([_, value]) => value && value.length !== 0)
    .map(([key, value]) => {
      if (Array.isArray(value)) {
        return `${key}: ${value.join(", ")}`;
      }
      return `${key}: ${value}`;
    })
    .join(" | ");
}

    const DEFAULT = ["sell", "buy", "unknown"];

      filters.sellBuy.length === DEFAULT.length &&
      DEFAULT.every(v => filters.sellBuy.includes(v));

    if (!isDefault) {
      labels.push("Sell/Buy");
    }
  }

  if (filters.cities?.length) labels.push("Location");
  if (filters.contacts && filters.contacts !== "all") labels.push("Contacts");
  if (filters.contacted && filters.contacted !== "all") labels.push("Contacted");

  if (filters.status && filters.status.length > 0 && filters.status.length < 5) {
    labels.push("Status");
  }

  if (filters.priceMin || filters.priceMax) labels.push("Price");
  
  return labels;
}

async function downloadExportClean() {

  const select = document.getElementById("exportFields");
  const selected = [...select.selectedOptions].map(o => o.value);

  const fields = selected.length === 0 ? null : selected;

  const view = state.view;
  let filteredRows = [];

    if (view === "all") {
    const posts = applyPostsFilters(DB.Post);
    const comments = applyCommentsFilters(DB.Comment);

    filteredRows = [
      ...posts.map(p => ({
        Type: "post",
        TextPost: p.TextPost ?? p.PostText ?? p.Post ?? "",
        TextComment: "",
        UserName: p.UserName ?? "",
        ProfileURL: p.ProfileURL ?? "",
        Intent: p.SellBuy ?? p.Intent ?? "",
        City: p.City ?? "",
        Price: p.Price ?? "",
        Contacts: p.Contacts ?? "",
        Status: p.Status ?? "",
        notes: p.notes ?? ""
      })),
      ...comments.map(c => ({
        Type: "comment",
        TextPost: c.TextPost ?? c.PostText ?? c.Post ?? "",
        TextComment: c.TextComment ?? c.Text ?? c.Comments ?? "",
        UserName: c.UserName ?? "",
        ProfileURL: c.ProfileURL ?? "",
        Intent: c.SellBuy ?? c.Intent ?? "",
        City: c.City ?? "",
        Price: c.Price ?? "",
        Contacts: c.Contacts ?? "",
        Status: c.Status ?? "",
        notes: c.notes ?? ""
      })),
    ];
  }
  else if (view === "users") {
    filteredRows = applyUsersFilters(DB.User);
  }
  else if (view === "posts") {
    filteredRows = applyPostsFilters(DB.Post);
  }
  else if (view === "comments") {
    filteredRows = applyCommentsFilters(DB.Comment);
  }

  if (!filteredRows.length) {
    alert("No data to export");
    return;
  }

  const token = localStorage.getItem("auth_token");

  const response = await fetch("/export", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      view,
      rows: filteredRows,
      fields
    })
  });

  if (!response.ok) {
    alert("Export failed");
    return;
  }

  const blob = await response.blob();
  const url = window.URL.createObjectURL(blob);

  const fileName = buildFileName(view, state.applied[view]);

  const a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  a.remove();

  window.URL.revokeObjectURL(url);
}



function buildFileName(view, filters){
  const date = new Date().toISOString().split("T")[0];

  let parts = ["Dataset", view, date];

  if(filters.sellBuy?.length === 1){
    parts.push(filters.sellBuy[0]);
  }

  return parts.join("_") + ".csv";
}

    // Keep the top scrollbar in sync with the main table container
    function syncScrollbars(){
      const wrap = $("tableWrap");
      const top = $("tableScrollTop");
      const spacer = $("tableScrollSpacer");
      const table = wrap?.querySelector("table");
      if(!wrap || !top || !spacer || !table) return;

      spacer.style.width = table.scrollWidth + "px";
      top.scrollLeft = wrap.scrollLeft;
      // ensure the top bar stays visible even when content fits; small width keeps scrollbar area usable
      top.style.display = "block";

      let lock = false;
      top.onscroll = () => {
        if(lock) return;
        lock = true;
        wrap.scrollLeft = top.scrollLeft;
        lock = false;
      };
      wrap.onscroll = () => {
        if(lock) return;
        lock = true;
        top.scrollLeft = wrap.scrollLeft;
        lock = false;
      };
    }

function render(){

  const role = localStorage.getItem("user_role");
  let view = state.view || "all";

  if (role !== "admin" && view === "dashboard") {
    view = "all";
    state.view = "all";
  }

  console.log("render view:", view);

  setPageHeader();

  // nav active
  document.querySelectorAll(".navItem").forEach(el => {
    el.classList.toggle("active", el.dataset.view === view);
  });

  renderFilters();

  const toolbar = document.querySelector(".tableToolbar");
  const footer  = document.querySelector(".tableFooter");
  const main    = document.querySelector(".tableWrap");

  if (toolbar) toolbar.style.display = "";
  if (footer)  footer.style.display  = "";
  if (main)    main.style.height = "";

  // ===== DASHBOARD =====
  if (view === "dashboard") {

    if (toolbar) toolbar.style.display = "none";
    if (footer)  footer.style.display  = "none";
    if (main)    main.style.height = "calc(100vh - 120px)";

    renderDashboard();
    return;
  }

  safeShow("metaWrap");
  safeShow("filtersWrap");
  safeShow("paginationWrap");

  const pill = $("activeFilterPill");
  if (pill){
    pill.textContent = activeFiltersLabel();
    pill.style.display = (view === "all") ? "" : "none";
  }

  // ===== GET ROWS =====
  let rows = [];

  if(view === "all"){

    rows = applyAllFilters(
      buildAllRows().filter(r => {

        if (r.Type === "group") return false;

        // скрываем посты из мусорки
        if (r.Type === "post") {
          const post = DB.Post.find(p => String(p.PostID) === String(r.PostID));
          if (post && Number(post.trash) === 1) return false;
        }

        return true;
      })
    );

  }

  else if(view === "users"){

    rows = applyUsersFilters();

  }

  else if(view === "posts"){
    const baseRows = DB.Post.filter(p => Number(p.trash) === 0);
    rows = applyPostsFilters(baseRows, state.applied.posts);
  }

  else if(view === "comments"){

    rows = applyCommentsFilters();

  }

  else if(view === "trash"){
    const baseRows = DB.Post.filter(p => Number(p.trash) === 1);
    rows = applyPostsFilters(baseRows, state.applied.trash);
  }

  // ===== PAGINATION =====
  const pg = state.pagination[view] || state.pagination.all;

  const total = rows.length;
  const totalPages = Math.max(1, Math.ceil(total / pg.pageSize));

  if (pg.page > totalPages){
    pg.page = totalPages;
  }

  const start = (pg.page - 1) * pg.pageSize;
  const end   = start + pg.pageSize;

  const pageRows = rows.slice(start, end);

  console.log("[pagination]", {
    view,
    total,
    page: pg.page,
    pageSize: pg.pageSize,
    totalPages
  });

  // ===== META =====
  renderMeta(total);

  // ===== TABLE =====
  if(view === "all"){
    renderAllTable(pageRows);
  }
  else if(view === "users"){
    renderUsersTable(pageRows);
  }
  else if(view === "posts"){
    renderPostsTable(pageRows);
  }
  else if(view === "comments"){
    renderCommentsTable(pageRows);
  }
  else if(view === "trash"){
    renderPostsTable(pageRows);
  }
  else{
    $("tableWrap").innerHTML = "";
  }

  // ===== PAGINATION =====
  renderPagination(total);

}

function matchesStatusFilter(userId, filterValue){
  if (!filterValue || filterValue === "all")
    return true;

  const u = userById(userId);
  if (!u) return false;

  const userStatus = Number(u.Contacted ?? 0);

  if (Array.isArray(filterValue))
    return filterValue.includes(userStatus);

  return userStatus === Number(filterValue);
}

function applyAllFilters(rows){
  const f = state.applied.all || {};

  rows = (Array.isArray(rows) ? rows : [])
    .filter(r => r && r.Type !== "group");

  // 🔥 USER FOCUS
  if (state.userFocus) {
    const focusId = String(state.userFocus.UserID);

    rows = rows.filter(r => {
      if (state.view === "comments") {
        return r.Type === "comment" &&
               String(r.CommentUserID ?? "") === focusId;
      }

      if (state.view === "all") {
        if (r.Type === "post")
          return String(r.UserID ?? "") === focusId;

        if (r.Type === "comment")
          return String(r.CommentUserID ?? "") === focusId;

        return false;
      }

      return true;
    });
  }

  const q = (f.query || "").toLowerCase().trim();
  const sellSet = Array.isArray(f.sellBuy)
    ? f.sellBuy
    : ["sell","buy","unknown"];

  const citySet = new Set(f.cities || []);
  const minPrice = f.priceMin !== "" ? Number(f.priceMin) : null;
  const maxPrice = f.priceMax !== "" ? Number(f.priceMax) : null;

  const out = rows.filter(r => {

    // 🔥 STATUS FILTER (фикс)
    if (Array.isArray(f.status) && f.status.length > 0) {

        const userId =
          r.Type === "comment"
            ? r.CommentUserID
            : r.UserID;

        const user = DB.User.find(
          u => String(u.UserID) === String(userId)
        );

        const userStatus = Number(user?.Contacted ?? 0);

        if (!f.status.includes(userStatus))
          return false;
      }


    // SELL / BUY
    if (!matchesSellBuySet(r.SellOrBuy, sellSet))
      return false;

    // CITY
    if (citySet.size) {
      const city = getAllRowCity(r);
      if (!citySet.has(city)) return false;
    }

    // CONTACTS
    if (f.contacts !== "all") {
      const hasContacts = getAllRowHasContacts(r);
      if (f.contacts === "yes" && !hasContacts) return false;
      if (f.contacts === "no" && hasContacts) return false;
    }

    // PRICE
    if (minPrice !== null || maxPrice !== null) {
      const price = getAllRowPrice(r);
      if (minPrice !== null && price < minPrice) return false;
      if (maxPrice !== null && price > maxPrice) return false;
    }

// SEARCH
    if (q) {
      const ql = q;

      const match =
        (r.UserName && r.UserName.toLowerCase().includes(ql)) ||
        (r.PostText && r.PostText.toLowerCase().includes(ql)) ||
        (r.Text && r.Text.toLowerCase().includes(ql)) ||
        (r.notes && r.notes.toLowerCase().includes(ql));

      if (!match) return false;
    }

    return true;
  });

  // 🔥 SORTING
if (f.landSort && f.landSort !== "none") {
  const dir = f.landSort === "asc" ? 1 : -1;
  out.sort((a,b) => (getAllRowLand(a) - getAllRowLand(b)) * dir);

} else if (f.priceSort && f.priceSort !== "none") {
  const dir = f.priceSort === "asc" ? 1 : -1;
  out.sort((a,b) => (getAllRowPrice(a) - getAllRowPrice(b)) * dir);

} else if (f.citySort && f.citySort !== "none") {
  const dir = f.citySort === "asc" ? 1 : -1;
  out.sort((a,b) =>
    getAllRowCity(a)
      .localeCompare(getAllRowCity(b), "en", { sensitivity:"base" }) * dir
  );

} else if (f.dateSort === "oldest") {
  out.sort((a,b) =>
    (parseISO(a.DateISO)?.getTime() || 0) -
    (parseISO(b.DateISO)?.getTime() || 0)
  );

} else {
  // newest default
  out.sort((a,b) =>
    (parseISO(b.DateISO)?.getTime() || 0) -
    (parseISO(a.DateISO)?.getTime() || 0)
  );
}


  return out;
}


function applyUsersFilters() {
  const f = state.applied.users;
  if (!Array.isArray(f.status)) {
    f.status = [0,1,2,3,4];
  }
  // 1️⃣ Сначала просто собираем расширенные данные
  const rows = DB.User.map(u => {

    const last = getUserLastActivityDate(u.UserID);
    const texts = [];

    for (const p of DB.Post) {
      if (p.UserID === u.UserID) {
        texts.push((p.TextPost || "") + " " + (p.Tags || ""));
      }
    }

    let hasSell = false;
    let hasBuy  = false;

    for (const c of DB.Comment) {
      const ownerId = c.PostOwnerID ?? null;
      if (ownerId !== u.UserID) continue;

      const sb = inferSellBuyFromText(c.TextComment || "");
      if (sb === "sell") hasSell = true;
      if (sb === "buy")  hasBuy  = true;
    }

    const lang = detectLanguage(texts.join(" "));

    return {
      ...u,
      LastActivityDate: last ? new Date(last) : null,
      Language: lang,
      _hasSell: hasSell,
      _hasBuy: hasBuy,
      Contacts: u.Contacts || ""
    };
  });

  // 2️⃣ А теперь фильтруем
  const out = rows.filter(u => {

    // 🔥 STATUS
      if (Array.isArray(f.status) && f.status.length) {
        const userStatus = Number(u.Contacted ?? 0);
        if (!f.status.includes(userStatus)) return false;
      }

      // 📇 CONTACTS
      if (f.contacts !== "all") {

        const has = hasContactsObj(extractContacts(u));

        if (f.contacts === "yes" && !has)
          return false;

        if (f.contacts === "no" && has)
          return false;
      }
    // search
    if (f.q) {
      const q = f.q.toLowerCase();
      const blob = `${u.UserName} ${u.UserID} ${u.ProfileURL}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }

    // intent
    if (f.sellBuy !== "all") {
      if (f.sellBuy === "sell" && !u._hasSell) return false;
      if (f.sellBuy === "buy"  && !u._hasBuy)  return false;
      if (f.sellBuy === "unknown" && (u._hasSell || u._hasBuy)) return false;
    }

    if (!numInRange(u.CommsAllCount, f.minComms, f.maxComms)) return false;

    if (f.lang !== "all" && u.Language !== f.lang) return false;

    return true;
  });

  // сортировки
  if (f.sort === "newest") {
    out.sort((a,b) =>
      (b.LastActivityDate?.getTime() || 0) -
      (a.LastActivityDate?.getTime() || 0)
    );
  } else if (f.sort === "oldest") {
    out.sort((a,b) =>
      (a.LastActivityDate?.getTime() || 0) -
      (b.LastActivityDate?.getTime() || 0)
    );
  } else if (f.sort === "activity_desc") {
    out.sort((a,b) => Number(b.Activity||0) - Number(a.Activity||0));
  } else if (f.sort === "activity_asc") {
    out.sort((a,b) => Number(a.Activity||0) - Number(b.Activity||0));
  } else if (f.sort === "posts_desc") {
    out.sort((a,b) => Number(b.PostsAllCount||0) - Number(a.PostsAllCount||0));
  } else if (f.sort === "posts_asc") {
    out.sort((a,b) => Number(a.PostsAllCount||0) - Number(b.PostsAllCount||0));
  } else if (f.sort === "comms_desc") {
    out.sort((a,b) => Number(b.CommsAllCount||0) - Number(a.CommsAllCount||0));
  } else if (f.sort === "comms_asc") {
    out.sort((a,b) => Number(a.CommsAllCount||0) - Number(b.CommsAllCount||0));
  }

  return out;
}


      function applyPostsFilters(rows = DB.Post, filterState = state.applied.posts){
  const focus = state.userFocus;
  const f = filterState;

  rows = Array.isArray(rows) ? rows : [];

  const sellSet =
    Array.isArray(f.sellBuy) && f.sellBuy.length
      ? f.sellBuy
      : ["sell","buy","unknown"];

  const citySet = new Set(f.cities || []);
  const minPrice = f.priceMin !== "" ? Number(f.priceMin) : null;
  const maxPrice = f.priceMax !== "" ? Number(f.priceMax) : null;

  const out = rows.filter(p => {
    if(!p) return false;

    if(focus && p.UserID !== focus.UserID) return false;

    if (Array.isArray(f.status) && f.status.length) {
      const u = userById(p.UserID);
      const userStatus = Number(u?.Contacted ?? 0);
      if (!f.status.includes(userStatus)) return false;
    }

    const q = String(f.q || "").toLowerCase().trim();
    if (q) {
      const matchInText =
        String(p.TextPost || "").toLowerCase().includes(q);

      const matchInTags =
        String(p.Tags || "").toLowerCase().includes(q);

      const matchInNotes =
        String(p.notes || "").toLowerCase().includes(q);

      const matchInUser = (() => {
        const u = userById(p.UserID);
        return String(u?.UserName || "").toLowerCase().includes(q);
      })();

      if (!matchInText && !matchInTags && !matchInUser && !matchInNotes)
        return false;
    }

    if(f.contacts !== "all"){
      const has = postHasContacts(p);
      if(f.contacts === "yes" && !has) return false;
      if(f.contacts === "no" && has) return false;
    }

    const intent = (p.SellOrBuy || p.SellBuy || "unknown").toLowerCase();
    if(!matchesSellBuySet(intent, sellSet)) return false;

    if(citySet.size){
      const city = p.City || "-";
      if(!citySet.has(city)) return false;
    }

    if(minPrice !== null || maxPrice !== null){
      const price = Number(p.Price || 0);
      if(minPrice !== null && price < minPrice) return false;
      if(maxPrice !== null && price > maxPrice) return false;
    }

    return true;
  });

  if(f.commentsSort && f.commentsSort !== "none"){
    const dir = f.commentsSort === "asc" ? 1 : -1;
    out.sort((a,b) => (Number(a.CommentsCount||0) - Number(b.CommentsCount||0)) * dir);

  } else if(f.landSort && f.landSort !== "none"){
    const dir = f.landSort === "asc" ? 1 : -1;
    out.sort((a,b) => (Number(a.LandSize||0) - Number(b.LandSize||0)) * dir);

  } else if(f.priceSort && f.priceSort !== "none"){
    const dir = f.priceSort === "asc" ? 1 : -1;
    out.sort((a,b) => (Number(a.Price||0) - Number(b.Price||0)) * dir);

  } else if(f.citySort && f.citySort !== "none"){
    const dir = f.citySort === "asc" ? 1 : -1;
    out.sort((a,b) => (String(a.City||"").localeCompare(String(b.City||""), "en", { sensitivity:"base" }) * dir));

  } else if(f.dateSort === "oldest"){
    out.sort((a,b) => (parseISO(a.PostDate)?.getTime()||0) - (parseISO(b.PostDate)?.getTime()||0));

  } else {
    out.sort((a,b) => (parseISO(b.PostDate)?.getTime()||0) - (parseISO(a.PostDate)?.getTime()||0));
  }

  return out;
}


function applyCommentsFilters(){
  const focus = state.userFocus;
  const f = state.applied.comments;

  const sellSet = Array.isArray(f.sellBuy)
    ? f.sellBuy
    : ["sell","buy","unknown"];

  const citySet = new Set(f.cities || []);

  const out = DB.Comment.filter(c => {

    // 🔥 POST FOCUS
        if (state.postFocus) {
          if (String(c.PostID) !== String(state.postFocus))
            return false;
        }

    // 🔥 USER FOCUS
    if (focus) {
      const authorId = String(c.CommentUserID ?? c.UserID ?? "");
      const focusId  = String(focus.UserID ?? "");
      if (!authorId || authorId !== focusId) return false;
    }

    // ✅ STATUS (через пользователя)
    if (Array.isArray(f.status) && f.status.length) {
      const userId = c.CommentUserID ?? c.UserID;
      const user = DB.User.find(u => String(u.UserID) === String(userId));
      const userStatus = Number(user?.Contacted ?? 0);

      if (!f.status.includes(userStatus)) return false;
    }


    // 🔍 SEARCH
    if (f.q) {
      const q = String(f.q).toLowerCase();

      const matchInComment =
        String(c.TextComment || "").toLowerCase().includes(q);

      const matchInNotes =
        String(c.notes || "").toLowerCase().includes(q);

      const post = DB.Post.find(p => String(p.PostID) === String(c.PostID));

      const matchInPost =
        String(post?.TextPost || "").toLowerCase().includes(q);

      const user = DB.User.find(u => String(u.UserID) === String(c.UserID));

      const matchInUser =
        String(user?.UserName || "").toLowerCase().includes(q);

      if (!matchInComment && !matchInPost && !matchInUser && !matchInNotes)
        return false;
    }

    // 📇 CONTACTS
    if (f.contacts !== "all") {

      const has = hasContactsObj(extractContacts(c));

      if (f.contacts === "yes" && !has)
        return false;

      if (f.contacts === "no" && has)
        return false;
    }


    // 🎯 INTENT (берём из комментария ИЛИ поста)
    if (sellSet.length) {
      const intent =
        String(
          c.SellOrBuy ||
          c.SellBuy ||
          inferSellBuyFromText(c.TextComment) ||
          "unknown"
        ).toLowerCase();

      if (!matchesSellBuySet(intent, sellSet)) return false;
    }


    // 🏙 CITY (берём из связанного поста)
    if (citySet.size) {
      const post = DB.Post.find(p => String(p.PostID) === String(c.PostID));
      const city = post?.City || "-";
      if (!citySet.has(city)) return false;
    }

    return true;
  });

  // 📅 SORT
  if (f.dateSort === "oldest") {
    out.sort((a,b) =>
      (parseISO(a.CommentDate)?.getTime()||0) -
      (parseISO(b.CommentDate)?.getTime()||0)
    );
  } else {
    out.sort((a,b) =>
      (parseISO(b.CommentDate)?.getTime()||0) -
      (parseISO(a.CommentDate)?.getTime()||0)
    );
  }

  return out;
}

    function openModal({title, metaLineHtml="", blocks=[], buttons=[], modalClass=""}){
      const modalEl = document.querySelector(".modal");
      if(modalEl){
        modalEl.classList.remove("narrow");
        if(modalClass) modalEl.classList.add(modalClass);
      }
      $("modalTitle").textContent = title;
      const metaLine = metaLineHtml ? `<div class="metaLine">${metaLineHtml}</div>` : "";
        const blocksHtml = blocks.map(b => `
          <div class="block">
            <div class="blockTitle">${escapeHtml(b.title)}</div>
            ${
              b.html
                ? `<div class="blockContent">${b.html}</div>`
                : `<div class="blockText">${escapeHtml(b.text || "")}</div>`
            }
          </div>
        `).join("");
      $("modalBody").innerHTML = metaLine + blocksHtml;

      const footer = $("modalFooter");
      footer.innerHTML = "";
      buttons.forEach(btn => {
        const el = document.createElement("button");
        el.className = btn.className || "btn";
        el.textContent = btn.label;
        el.addEventListener("click", btn.onClick);
        footer.appendChild(el);
      });

      $("modalOverlay").classList.add("open");
    }

    function closeModal(){
      $("modalOverlay").classList.remove("open");
    }


function openStatusModal(UserID){
  const u = userById(UserID);
  if(!u) return;

  const current = Number(u.Contacted ?? 0);
  let selectedStatus = current; // ВАЖНО — объявлено в начале

  const options = Object.entries(USER_STATUS)
    .map(([value, label]) => `
      <div 
        class="statusOption status-${value} ${Number(value) === current ? "active" : ""}"
        data-value="${value}">
        ${label}
      </div>
    `).join("");

  $("modalTitle").textContent = "Change user status";

  $("modalBody").innerHTML = `
    <div class="confirmList">
      <div><strong>User:</strong> ${escapeHtml(u.UserName)}</div>
    </div>
    <div class="statusOptions">
      ${options}
    </div>
  `;

  // выбор статуса
  setTimeout(() => {
    document.querySelectorAll(".statusOption").forEach(el => {
      el.onclick = () => {
        document.querySelectorAll(".statusOption")
          .forEach(x => x.classList.remove("active"));

        el.classList.add("active");
        selectedStatus = Number(el.dataset.value);
      };
    });
  }, 0);

  const footer = $("modalFooter");
  footer.innerHTML = "";

  const cancelBtn = document.createElement("button");
  cancelBtn.className = "btn";
  cancelBtn.textContent = "Cancel";
  cancelBtn.onclick = closeModal;
  footer.appendChild(cancelBtn);

  const saveBtn = document.createElement("button");
  saveBtn.className = "btn primary";
  saveBtn.textContent = "Save";

  saveBtn.onclick = async () => {
    try{
      await apiFetch(`/users/${UserID}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: selectedStatus })
      });

      u.Contacted = selectedStatus;
      closeModal();
      render();

    }catch(err){
      console.error(err);
      alert("Failed to update status");
    }
  };

  footer.appendChild(saveBtn);
  $("modalOverlay").classList.add("open");
}

          const vals = Array.from(document.querySelectorAll('input[name="comments_sellBuy"]:checked')).map(el => el.value);
          f.sellBuy = vals.length ? vals : ["sell","buy","unknown"];
        }
      }
      if(kind === "comments_Location"){
        const noneChecked = document.querySelector('input[name="comments_Location_none"]')?.checked;
        if(noneChecked){
          f.cities = [];
        } else {
          const vals = Array.from(document.querySelectorAll('input[name="comments_Location"]:checked')).map(el => el.value);
          f.cities = vals;
        }
        const sortVal = document.querySelector('input[name="comments_Location_sort"]:checked')?.value || "none";
        f.citySort = sortVal;
        if(sortVal !== "none"){
          f.dateSort = "none";
          f.landSort = "none";
          f.priceSort = "none";
        }
      }
      if(kind === "comments_land"){
        const val = document.querySelector('input[name="comments_land_sort"]:checked')?.value || "none";
        f.landSort = val;
        if(val !== "none"){
          f.priceSort = "none";
          f.dateSort = "none";
          f.citySort = "none";
        }
      }
      if(kind === "comments_price"){
        const val = document.querySelector('input[name="comments_price_sort"]:checked')?.value || "none";
        f.priceSort = val;
        f.priceMin = document.getElementById("comments_price_min")?.value || "";
        f.priceMax = document.getElementById("comments_price_max")?.value || "";
        if(val !== "none"){
          f.landSort = "none";
          f.dateSort = "none";
          f.citySort = "none";
        }
      }
      if(kind === "comments_contacts"){
        const val = document.querySelector('input[name="comments_contacts"]:checked')?.value || "all";
        f.contacts = val;
      }
      if (kind === "comments_status") {
        const vals = Array.from(
          document.querySelectorAll('input[name="comments_status"]:checked')
        ).map(el => Number(el.value));

        f.status = vals;
      }

      state.draft.comments = JSON.parse(JSON.stringify(f));
      closeAllFilterPopovers();
      render();
    }

    // ------------------------
    // Events
    // ------------------------
    function wireEvents(){
      // Sidebar toggle
      $("sidebarToggle").addEventListener("click", () => {
        if(window.matchMedia("(max-width: 720px)").matches){
          state.mobileSidebarOpen = !state.mobileSidebarOpen;
          $("sidebar").classList.toggle("mobileOpen", state.mobileSidebarOpen);
        } else {
          state.sidebarCollapsed = !state.sidebarCollapsed;
          $("sidebar").classList.toggle("collapsed", state.sidebarCollapsed);
        }
      });

      // Nav
      $("nav").addEventListener("click", (e) => {
        const item = e.target.closest(".navItem");
        if(!item) return;

        const view = item.dataset.view;

        state.view = view;
        if (state.pagination?.[view]) {
          state.pagination[view].page = 1;
        }

        // close mobile sidebar on nav
        if(window.matchMedia("(max-width: 720px)").matches){
          state.mobileSidebarOpen = false;
          $("sidebar").classList.remove("mobileOpen");
        }

        render();
      });

      // Filters toggle
      const filtersToggle = $("filtersToggle");
      if(filtersToggle){
        filtersToggle.addEventListener("click", () => {
          state.filtersOpen = !state.filtersOpen;
          render();
        });
      }

      // Apply
      const applyBtn = $("applyBtn");
      if(applyBtn) applyBtn.addEventListener("click", () => applyFilters());

      // Reset
      $("resetBtn").addEventListener("click", () => resetFilters());

      const globalSearchApply = $("globalSearchApply");

      if (globalSearchApply) {
        globalSearchApply.addEventListener("click", (e) => {
          e.preventDefault();

          const value = $("globalSearch")?.value || "";
          const view = state.view;

          if (view === "all") {
            state.applied.all.query = value;
            state.draft.all = structuredClone(state.applied.all);
          }

          else if (view === "users") {
            state.applied.users.q = value;
            state.draft.users = structuredClone(state.applied.users);
          }

          else if (view === "posts") {
            state.applied.posts.q = value;
            state.draft.posts = structuredClone(state.applied.posts);
          }

          else if (view === "comments") {
            state.applied.comments.q = value;
            state.draft.comments = structuredClone(state.applied.comments);
          }

          else if (view === "trash") {
            state.applied.trash.q = value;
            state.draft.trash = structuredClone(state.applied.trash);
          }

          state.pagination[view].page = 1;
          render();
        });
      }


      if(globalSearch){
        globalSearch.addEventListener("keydown", (e) => {
          if(e.key === "Enter"){
            e.preventDefault();
            const btn = $("globalSearchApply");
            if(btn) btn.click();
          }
        });
      }

      // Delegated actions
      document.addEventListener("click", (e) => {
        const actionEl = e.target.closest("[data-action]");
        if(!actionEl) return;

        const action = actionEl.dataset.action;

        if(action === "openLink"){
          const url = actionEl.dataset.url;
          if(url) window.open(url, "_blank", "noopener");
          return;
        }

        if(action === "changeStatus"){
          openStatusModal(actionEl.dataset.user);
          return;
        }

        if(action === "openTextModal"){
          openTextDetails(actionEl.dataset.payload);
          return;
        }

        if(action === "openUserDetails"){
          openUserDetails(actionEl.dataset.user);
          return;
        }

        if(action === "jumpToPosts"){
          e.preventDefault();
          const uid = actionEl.dataset.user;
          const u = userById(uid);
          state.userFocus = { UserID: uid, UserName: u?.UserName || uid };
          state.view = "posts";
          render();
          return;
        }

        if(action === "jumpToComments"){
          e.preventDefault();
          const uid = actionEl.dataset.user;
          const u = userById(uid);
          state.userFocus = { UserID: uid, UserName: u?.UserName || uid };
          state.view = "comments";
          render();
          return;
        }

        if(action === "clearUserFocus"){
          state.userFocus = null;
          render();
          return;
        }
      });

      document.addEventListener("click", (e) => {
        const filterBtn = e.target.closest("[data-filter-btn]");
        if(filterBtn){
          e.preventDefault();
          e.stopPropagation();
          toggleFilterPopover(filterBtn.dataset.filterBtn);
          return;
        }
        const applyBtn = e.target.closest("[data-filter-apply]");
        if(applyBtn){
          e.preventDefault();
          e.stopPropagation();
          const key = applyBtn.dataset.filterApply;
          if(key.startsWith("users_")) applyUsersHeaderFilter(key);
          else if(key.startsWith("posts_")) applyPostsHeaderFilter(key);
          else if(key.startsWith("comments_")) applyCommentsHeaderFilter(key);
          else applyAllHeaderFilter(key);
          applyBtn.classList.remove("active");
          return;
        }
        const cancelBtn = e.target.closest("[data-filter-cancel]");
        if(cancelBtn){
          e.preventDefault();
          e.stopPropagation();
          const pop = cancelBtn.closest(".filterPopover");
          if(pop){
            const apply = pop.querySelector("[data-filter-apply]");
            if(apply) apply.classList.remove("active");
          }
          closeAllFilterPopovers();
          return;
        }
        const actionBtn = e.target.closest("[data-filter-action]");
        if(actionBtn){
          e.preventDefault();
          e.stopPropagation();
          const action = actionBtn.dataset.filterAction;
          if(action === "sellbuy_all"){
            document.querySelectorAll('input[name="all_sellBuy"]').forEach(el => el.checked = true);
            const no = document.querySelector('input[name="all_sellBuy_none"]'); if(no) no.checked = false;
          }
          if(action === "sellbuy_none"){
            document.querySelectorAll('input[name="all_sellBuy"]').forEach(el => el.checked = false);
            const no = document.querySelector('input[name="all_sellBuy_none"]'); if(no) no.checked = false;
          }
          if(action === "Location_all"){
            document.querySelectorAll('input[name="all_Location"]').forEach(el => el.checked = true);
            const no = document.querySelector('input[name="all_Location_none"]'); if(no) no.checked = false;
          }
          if(action === "Location_none"){
            document.querySelectorAll('input[name="all_Location"]').forEach(el => el.checked = false);
            const no = document.querySelector('input[name="all_Location_none"]'); if(no) no.checked = false;
          }
          if(action === "posts_sellbuy_all"){
            document.querySelectorAll('input[name="posts_sellBuy"]').forEach(el => el.checked = true);
            const no = document.querySelector('input[name="posts_sellBuy_none"]'); if(no) no.checked = false;
          }
          if(action === "posts_sellbuy_none"){
            document.querySelectorAll('input[name="posts_sellBuy"]').forEach(el => el.checked = false);
            const no = document.querySelector('input[name="posts_sellBuy_none"]'); if(no) no.checked = false;
          }
          if(action === "posts_Location_all"){
            document.querySelectorAll('input[name="posts_Location"]').forEach(el => el.checked = true);
            const no = document.querySelector('input[name="posts_Location_none"]'); if(no) no.checked = false;
          }
          if(action === "posts_Location_none"){
            document.querySelectorAll('input[name="posts_Location"]').forEach(el => el.checked = false);
            const no = document.querySelector('input[name="posts_Location_none"]'); if(no) no.checked = false;
          }
          if(action === "comments_sellbuy_all"){
            document.querySelectorAll('input[name="comments_sellBuy"]').forEach(el => el.checked = true);
            const no = document.querySelector('input[name="comments_sellBuy_none"]'); if(no) no.checked = false;
          }
          if(action === "comments_sellbuy_none"){
            document.querySelectorAll('input[name="comments_sellBuy"]').forEach(el => el.checked = false);
            const no = document.querySelector('input[name="comments_sellBuy_none"]'); if(no) no.checked = false;
          }
          if(action === "comments_Location_all"){
            document.querySelectorAll('input[name="comments_Location"]').forEach(el => el.checked = true);
            const no = document.querySelector('input[name="comments_Location_none"]'); if(no) no.checked = false;
          }
          if(action === "comments_Location_none"){
            document.querySelectorAll('input[name="comments_Location"]').forEach(el => el.checked = false);
            const no = document.querySelector('input[name="comments_Location_none"]'); if(no) no.checked = false;
          }
          return;
        }
        if(e.target.closest(".filterPopover")) return;
        closeAllFilterPopovers();
      });

      document.addEventListener("input", (e) => {
        const pop = e.target.closest(".filterPopover");
        if(pop){
          const apply = pop.querySelector("[data-filter-apply]");
          if(apply) apply.classList.add("active");
        }
        if(e.target && e.target.id === "all_Location_search"){
          const q = e.target.value.trim().toLowerCase();
          const items = document.querySelectorAll("[data-Location-option]");
          items.forEach(el => {
            const name = (el.getAttribute("data-Location-option") || "").toLowerCase();
            el.style.display = !q || name.includes(q) ? "" : "none";
          });
        }
        if(e.target && e.target.id === "posts_Location_search"){
          const q = e.target.value.trim().toLowerCase();
          const items = document.querySelectorAll("[data-Location-option]");
          items.forEach(el => {
            const name = (el.getAttribute("data-Location-option") || "").toLowerCase();
            el.style.display = !q || name.includes(q) ? "" : "none";
          });
        }
        if(e.target && e.target.id === "comments_Location_search"){
          const q = e.target.value.trim().toLowerCase();
          const items = document.querySelectorAll("[data-Location-option]");
          items.forEach(el => {
            const name = (el.getAttribute("data-Location-option") || "").toLowerCase();
            el.style.display = !q || name.includes(q) ? "" : "none";
          });
        }
        if(e.target && e.target.name === "all_sellBuy_none"){
          if(e.target.checked){
            document.querySelectorAll('input[name="all_sellBuy"]').forEach(el => el.checked = false);
          }
        }
        if(e.target && e.target.name === "all_Location_none"){
          if(e.target.checked){
            document.querySelectorAll('input[name="all_Location"]').forEach(el => el.checked = false);
          }
        }
        if(e.target && e.target.name === "posts_sellBuy_none"){
          if(e.target.checked){
            document.querySelectorAll('input[name="posts_sellBuy"]').forEach(el => el.checked = false);
          }
        }
        if(e.target && e.target.name === "posts_Location_none"){
          if(e.target.checked){
            document.querySelectorAll('input[name="posts_Location"]').forEach(el => el.checked = false);
          }
        }
        if(e.target && e.target.name === "comments_sellBuy_none"){
          if(e.target.checked){
            document.querySelectorAll('input[name="comments_sellBuy"]').forEach(el => el.checked = false);
          }
        }
        if(e.target && e.target.name === "comments_Location_none"){
          if(e.target.checked){
            document.querySelectorAll('input[name="comments_Location"]').forEach(el => el.checked = false);
          }
        }
        if(e.target && e.target.name === "all_sellBuy"){
          const no = document.querySelector('input[name="all_sellBuy_none"]');
          if(no) no.checked = false;
        }
        if(e.target && e.target.name === "all_Location"){
          const no = document.querySelector('input[name="all_Location_none"]');
          if(no) no.checked = false;
        }
        if(e.target && e.target.name === "posts_sellBuy"){
          const no = document.querySelector('input[name="posts_sellBuy_none"]');
          if(no) no.checked = false;
        }
        if(e.target && e.target.name === "posts_Location"){
          const no = document.querySelector('input[name="posts_Location_none"]');
          if(no) no.checked = false;
        }
        if(e.target && e.target.name === "comments_sellBuy"){
          const no = document.querySelector('input[name="comments_sellBuy_none"]');
          if(no) no.checked = false;
        }
        if(e.target && e.target.name === "comments_Location"){
          const no = document.querySelector('input[name="comments_Location_none"]');
          if(no) no.checked = false;
        }
      });

      // Modal close
      $("modalClose").addEventListener("click", closeModal);
      $("modalOverlay").addEventListener("click", (e) => {
        if(e.target === $("modalOverlay")) closeModal();
      });

      document.addEventListener("keydown", (e) => {
        if(e.key === "Escape") closeModal();
      });

      // Close mobile sidebar if clicking outside
      document.addEventListener("click", (e) => {
        if(!window.matchMedia("(max-width: 720px)").matches) return;
        const sidebar = $("sidebar");
        const clickedInside = sidebar.contains(e.target) || e.target.id === "sidebarToggle" || e.target.closest("#sidebarToggle");
        if(state.mobileSidebarOpen && !clickedInside){
          state.mobileSidebarOpen = false;
          sidebar.classList.remove("mobileOpen");
        }
      });

      window.addEventListener("resize", () => {
        requestAnimationFrame(() => detectOverflowAndToggleMore());
      });
    }
    (function init(){
      wireEvents();
      render();
    })();
  </script>


</body>
</html>
